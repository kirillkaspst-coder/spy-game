<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шпион · QUENTI | Ведущий</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: white;
            background: #050b1a;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: auto;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .glass-panel {
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 1.8rem;
            transition: all 0.3s ease;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 30px;
        }

        .game-area { flex: 2; }
        .players-area { flex: 1.2; }

        /* Анимации появления */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-item {
            opacity: 0;
            transform: translateY(30px);
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.12s; }
        .delay-3 { animation-delay: 0.19s; }
        .delay-4 { animation-delay: 0.26s; }
        .delay-5 { animation-delay: 0.33s; }
        .delay-6 { animation-delay: 0.40s; }
        .delay-7 { animation-delay: 0.47s; }
        .delay-8 { animation-delay: 0.54s; }

        /* Кнопки */
        .glass-btn {
            background: rgba(20, 30, 55, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            margin: 5px;
        }

        .glass-btn:hover {
            transform: scale(1.05);
            background: rgba(50, 70, 120, 0.8);
            box-shadow: 0 0 18px rgba(59, 130, 246, 0.7);
            border-color: rgba(59, 130, 246, 0.8);
        }

        .glass-btn:active { transform: scale(0.98); }

        .btn-primary { background: linear-gradient(135deg, rgba(59, 130, 246, 0.8), rgba(37, 99, 235, 0.8)); }
        .btn-danger { background: linear-gradient(135deg, rgba(239, 68, 68, 0.8), rgba(220, 38, 38, 0.8)); }
        .btn-warning { background: linear-gradient(135deg, rgba(245, 158, 11, 0.8), rgba(217, 119, 6, 0.8)); }

        /* Игроки */
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 550px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .player-card {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            border-radius: 1.5rem;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-card:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: translateX(8px);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .player-avatar { font-size: 1.8rem; margin-right: 8px; vertical-align: middle; }
        .player-actions button {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            margin: 3px;
            cursor: pointer;
            color: white;
            font-size: 0.75rem;
            transition: 0.1s;
        }
        .player-actions button:hover { transform: scale(1.05); background: #3b82f6; }
        .kick-btn { background: #ef4444; }
        .mute-btn { background: #f59e0b; }
        .ban-btn { background: #7c2d12; }
        .vote-btn { background: #8b5cf6; }

        /* Чат */
        .chat-log {
            height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1rem;
            padding: 12px;
            font-size: 0.85rem;
            margin: 15px 0;
        }

        .chat-message {
            animation: messagePop 0.2s ease-out;
            padding: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes messagePop {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .chat-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .chat-input input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
            padding: 12px 18px;
            color: white;
        }
        .chat-input input:focus { outline: none; border-color: #3b82f6; }

        .word-status {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        .big-word {
            font-size: 2rem;
            font-weight: 800;
            color: #facc15;
            text-shadow: 0 0 8px rgba(250,204,21,0.4);
        }

        .settings-panel {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 1.5rem;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        input[type="range"] { width: 180px; }
        .fps-counter {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .dashboard { flex-direction: column; }
            .glass-btn { padding: 8px 16px; font-size: 0.8rem; }
            .big-word { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="content">
        <div class="dashboard">
            <div class="game-area glass-panel animate-item delay-1">
                <h2 style="margin-bottom: 15px;">🎮 ВЕДУЩИЙ (СЛОВО СКРЫТО)</h2>
                <div class="controls animate-item delay-2">
                    <button class="glass-btn btn-primary" id="startRoundBtn">🎲 НАЧАТЬ РАУНД</button>
                    <button class="glass-btn" id="nextTurnBtn">🔄 СЛЕД. ХОД</button>
                    <button class="glass-btn btn-danger" id="revealWordBtn">🔍 РАСКРЫТЬ СЛОВО</button>
                    <button class="glass-btn btn-warning" id="forceVoteBtn">🗳️ ГОЛОСОВАНИЕ</button>
                </div>

                <div class="word-status animate-item delay-3">
                    <div>📖 СТАТУС ИГРЫ</div>
                    <div id="gameStatusWord" class="big-word">—</div>
                    <div id="turnStatus" style="margin-top: 10px;"></div>
                </div>

                <div id="votePanel" class="word-status animate-item delay-4" style="display:none; background:#8b5cf633;">
                    <div><strong>🗳️ ГОЛОСОВАНИЕ</strong></div>
                    <div id="voteInfo"></div>
                    <div id="voteResults"></div>
                    <button class="glass-btn" id="endVoteBtn">✅ ЗАВЕРШИТЬ</button>
                </div>

                <div class="animate-item delay-5">
                    <div><strong>💬 ЧАТ</strong></div>
                    <div class="chat-log" id="chatLog"></div>
                    <div class="chat-input">
                        <input type="text" id="chatInput" placeholder="Сообщение...">
                        <button class="glass-btn" id="sendChatBtn">➤</button>
                    </div>
                </div>

                <div class="animate-item delay-6">
                    <button id="settingsBtn" class="glass-btn" style="width:100%; margin-top:10px;">⚙️ НАСТРОЙКИ</button>
                </div>
                <div id="settingsPanel" class="settings-panel">
                    <div class="settings-row">
                        <span>✨ 3D-ТРЕУГОЛЬНИКИ:</span>
                        <button id="toggleParticlesBtn" class="glass-btn" style="background:#22c55e;">ВЫКЛЮЧИТЬ</button>
                    </div>
                    <div class="settings-row">
                        <span>💡 ЯРКОСТЬ СВЕЧЕНИЯ:</span>
                        <input type="range" id="brightnessSlider" min="0" max="100" value="50">
                        <span id="brightnessVal">50%</span>
                    </div>
                    <div class="settings-row">
                        <span>🌀 СКОРОСТЬ ВРАЩЕНИЯ:</span>
                        <input type="range" id="speedSlider" min="0" max="100" value="35">
                        <span id="speedVal">35%</span>
                    </div>
                    <div class="settings-row">
                        <span>📊 ПОКАЗЫВАТЬ FPS:</span>
                        <input type="checkbox" id="showFpsToggle">
                    </div>
                </div>
                <div id="messageArea" class="animate-item delay-7"></div>
            </div>

            <div class="players-area glass-panel animate-item delay-2">
                <h3>👥 ИГРОКИ</h3>
                <div id="playersContainer" class="players-list">✨ Ожидание игроков...</div>
            </div>
        </div>
    </div>

    <div class="fps-counter" id="fpsCounter" style="display: none;">FPS: 0</div>

    <script type="module">
        import * as THREE from 'three';

        // === 3D ТРЕУГОЛЬНИКИ (полностью идентичны player.html) ===
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x050b1a, 1);
        container.appendChild(renderer.domElement);

        const createGradientTexture = (hue) => {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, `hsl(${hue}, 100%, 65%)`);
            grad.addColorStop(0.5, `hsl(${hue - 10}, 90%, 55%)`);
            grad.addColorStop(1, `hsl(${hue + 15}, 100%, 70%)`);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.4)`;
            ctx.fill();
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            return texture;
        };

        const extrudeSettings = { steps: 1, depth: 0.28, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05, bevelSegments: 3 };
        const shape = new THREE.Shape();
        shape.moveTo(0, 0.72);
        shape.lineTo(-0.65, -0.58);
        shape.lineTo(0.65, -0.58);
        shape.closePath();
        const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geometry.computeVertexNormals();
        geometry.center();

        const trianglesGroup = new THREE.Group();
        scene.add(trianglesGroup);
        let triangles = [];
        let particlesEnabled = true;
        let globalBrightness = 0.5;
        let globalSpeed = 0.35;
        const triangleCount = 110;

        function getRandomDirection() {
            return new THREE.Vector3(
                (Math.random() - 0.5) * 1.4,
                (Math.random() - 0.5) * 1.0,
                (Math.random() - 0.5) * 1.0
            ).normalize();
        }

        function createTriangle() {
            const hue = 180 + Math.random() * 180;
            const texture = createGradientTexture(hue);
            const material = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3, metalness: 0.7, emissive: `hsl(${hue}, 80%, 50%)`, emissiveIntensity: globalBrightness });
            const mesh = new THREE.Mesh(geometry, material);
            const scale = Math.random() * 0.65 + 0.35;
            mesh.scale.set(scale, scale, scale);
            mesh.position.x = (Math.random() - 0.5) * 28;
            mesh.position.y = (Math.random() - 0.5) * 18;
            mesh.position.z = (Math.random() - 0.5) * 20 - 8;
            mesh.castShadow = true;
            mesh.userData = {
                originalPos: mesh.position.clone(),
                velocity: new THREE.Vector3(0, 0, 0),
                active: true,
                rotSpeedX: (Math.random() - 0.5) * 0.004 * globalSpeed,
                rotSpeedY: (Math.random() - 0.5) * 0.004 * globalSpeed,
                rotSpeedZ: (Math.random() - 0.5) * 0.004 * globalSpeed
            };
            return mesh;
        }

        function initTriangles() {
            triangles.forEach(t => trianglesGroup.remove(t));
            triangles = [];
            for (let i = 0; i < triangleCount; i++) {
                const tri = createTriangle();
                trianglesGroup.add(tri);
                triangles.push(tri);
            }
        }
        initTriangles();

        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(1.5, 2.5, 1.5);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x6688ff, 0.45);
        fillLight.position.set(-1, 1, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.35);
        backLight.position.set(0, 1, -5);
        scene.add(backLight);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let time = 0;

        window.addEventListener('mousemove', (event) => {
            if (!particlesEnabled) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(triangles);
            intersects.forEach(intersect => {
                const tri = intersect.object;
                if (tri.userData.active) {
                    const dir = getRandomDirection().multiplyScalar(0.45);
                    tri.userData.velocity = dir;
                    tri.userData.active = false;
                }
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            if (particlesEnabled) {
                for (let i = 0; i < triangles.length; i++) {
                    const tri = triangles[i];
                    if (tri.userData.active) {
                        tri.rotateX(tri.userData.rotSpeedX);
                        tri.rotateY(tri.userData.rotSpeedY);
                        tri.rotateZ(tri.userData.rotSpeedZ);
                        tri.position.y += Math.sin(time * 0.6) * 0.002;
                    } else {
                        tri.userData.velocity.multiplyScalar(0.99);
                        tri.position.x += tri.userData.velocity.x * 0.08;
                        tri.position.y += tri.userData.velocity.y * 0.08;
                        tri.position.z += tri.userData.velocity.z * 0.08;
                        if (Math.abs(tri.userData.velocity.x) < 0.01 && Math.abs(tri.userData.velocity.y) < 0.01 && Math.abs(tri.userData.velocity.z) < 0.01) {
                            tri.userData.active = true;
                            tri.userData.velocity.set(0, 0, 0);
                        }
                    }
                }
            }
            trianglesGroup.rotation.y = Math.sin(time * 0.03) * 0.08;
            trianglesGroup.rotation.x = Math.sin(time * 0.04) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Настройки
        const toggleBtn = document.getElementById('toggleParticlesBtn');
        const brightnessSlider = document.getElementById('brightnessSlider');
        const brightnessVal = document.getElementById('brightnessVal');
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const showFpsToggle = document.getElementById('showFpsToggle');
        const fpsCounterDiv = document.getElementById('fpsCounter');

        toggleBtn.onclick = () => {
            particlesEnabled = !particlesEnabled;
            toggleBtn.textContent = particlesEnabled ? 'ВЫКЛЮЧИТЬ' : 'ВКЛЮЧИТЬ';
            toggleBtn.style.background = particlesEnabled ? '#22c55e' : '#ef4444';
            triangles.forEach(t => t.visible = particlesEnabled);
        };
        brightnessSlider.oninput = () => {
            globalBrightness = brightnessSlider.value / 100;
            brightnessVal.textContent = brightnessSlider.value + '%';
            triangles.forEach(t => t.material.emissiveIntensity = globalBrightness);
        };
        speedSlider.oninput = () => {
            globalSpeed = speedSlider.value / 100;
            speedVal.textContent = speedSlider.value + '%';
            triangles.forEach(t => {
                t.userData.rotSpeedX = (Math.random() - 0.5) * 0.004 * globalSpeed;
                t.userData.rotSpeedY = (Math.random() - 0.5) * 0.004 * globalSpeed;
                t.userData.rotSpeedZ = (Math.random() - 0.5) * 0.004 * globalSpeed;
            });
        };
        document.getElementById('settingsBtn').onclick = () => {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
        };

        // Счётчик FPS
        let lastTimeFPS = performance.now();
        let frames = 0;
        function updateFPS() {
            frames++;
            const now = performance.now();
            if (now - lastTimeFPS >= 1000) {
                if (showFpsToggle.checked) fpsCounterDiv.style.display = 'block';
                else fpsCounterDiv.style.display = 'none';
                fpsCounterDiv.textContent = `FPS: ${frames}`;
                frames = 0;
                lastTimeFPS = now;
            }
            requestAnimationFrame(updateFPS);
        }
        updateFPS();
    </script>

    <script type="text/javascript">
        // === ИГРОВАЯ ЛОГИКА (полностью рабочая) ===
        const socket = io();
        let players = {};

        socket.on('players_update', (data) => {
            players = data;
            const container = document.getElementById('playersContainer');
            const arr = Object.values(players);
            if (arr.length === 0) container.innerHTML = '✨ Ожидание игроков...';
            else {
                container.innerHTML = arr.map(p => `
                    <div class="player-card">
                        <div><span class="player-avatar">${p.avatar || '😀'}</span> <strong>${escapeHtml(p.name)}</strong> ${p.ready ? '✅' : '⏳'}</div>
                        <div class="player-actions">
                            <button class="kick-btn" onclick="kick('${p.id}')">🚪</button>
                            <button class="mute-btn" onclick="mute('${p.id}')">🔇</button>
                            <button class="ban-btn" onclick="ban('${p.id}')">⛔</button>
                            <button class="vote-btn" onclick="startVote('${p.id}')">🗳️</button>
                        </div>
                    </div>
                `).join('');
            }
        });

        socket.on('game_state', (s) => {
            document.getElementById('gameStatusWord').innerHTML = s.active ? '🎲 ИГРА ИДЁТ' : '—';
            document.getElementById('turnStatus').innerHTML = s.active && s.currentTurn ? `🎤 ХОДИТ: ${players[s.currentTurn]?.name || '?'}` : '⚙️ ОЖИДАНИЕ';
        });

        socket.on('chat_message', (m) => {
            const log = document.getElementById('chatLog');
            log.innerHTML += `<div class="chat-message"><strong>${escapeHtml(m.name)}</strong> <span style="font-size:0.7rem;">${m.time}</span><br>${escapeHtml(m.text)}</div>`;
            log.scrollTop = log.scrollHeight;
        });

        socket.on('chat_history', (msgs) => {
            const log = document.getElementById('chatLog');
            log.innerHTML = '';
            msgs.forEach(m => log.innerHTML += `<div class="chat-message"><strong>${escapeHtml(m.name)}</strong> ${m.time}<br>${escapeHtml(m.text)}</div>`);
        });

        socket.on('game_message', (msg) => {
            const d = document.getElementById('messageArea');
            d.innerHTML = `<div style="background:#dc2626;border-radius:1rem;padding:8px;margin:8px;">${escapeHtml(msg.text)}</div>`;
            setTimeout(() => d.innerHTML = '', 4000);
        });

        socket.on('voting_start', (data) => {
            const panel = document.getElementById('votePanel');
            panel.style.display = 'block';
            document.getElementById('voteInfo').innerHTML = `Голосование против: ${escapeHtml(data.targetName)}`;
            document.getElementById('voteResults').innerHTML = 'Ожидание голосов...';
        });

        socket.on('vote_update', (data) => {
            document.getElementById('voteResults').innerHTML = `Проголосовало: ${data.votesCount}/${data.total}`;
        });

        socket.on('voting_end', () => {
            document.getElementById('votePanel').style.display = 'none';
        });

        window.kick = (id) => socket.emit('kick', id);
        window.mute = (id) => socket.emit('mute', id);
        window.ban = (id) => socket.emit('ban', id);
        window.startVote = (id) => socket.emit('start_vote', id);

        document.getElementById('startRoundBtn').onclick = () => socket.emit('start_round');
        document.getElementById('nextTurnBtn').onclick = () => socket.emit('next_turn');
        document.getElementById('revealWordBtn').onclick = () => socket.emit('reveal_word');
        document.getElementById('forceVoteBtn').onclick = () => { if (Object.keys(players).length) startVote(Object.keys(players)[0]); };
        document.getElementById('endVoteBtn').onclick = () => socket.emit('end_vote');
        document.getElementById('sendChatBtn').onclick = () => {
            const inp = document.getElementById('chatInput');
            if (inp.value.trim()) socket.emit('chat_message', { text: inp.value });
            inp.value = '';
        };
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('sendChatBtn').click();
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
